<!DOCTYPE html>
<html>
<head>
    <title>Crime Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg">
    <div class="container mt-4">
        <div class="glass-card p-4">
            <h2 class="text-center text-white">Enter Crime Data</h2>

            <form action="/predict" method="POST">
                <div class="row mt-4 text-white">

                    <div class="col-md-4">
                        <label class="form-label">State/UT</label>
                        <select name="state" class="form-select">
                            {% for s in states %}
                                <option value="{{s}}">{{s}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">District</label>
                        <select name="district" class="form-select">
                            {% for d in districts %}
                                <option value="{{d}}">{{d}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Year</label>
                        <input type="number" name="year" class="form-control" value="2020" min="2001" max="2030">
                    </div>
                </div>

                <hr class="text-white">

                <h4 class="text-white">Crime Statistics</h4>
                <div class="row mt-3 text-white">
                    {% for feature in crime_features %}
                        <div class="col-md-4 mt-3">
                            <label>{{feature}}</label>
                            <input type="number" name="{{feature}}" class="form-control" min="0" value="0">
                        </div>
                    {% endfor %}
                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-light btn-lg">Predict</button>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
