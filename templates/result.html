<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg">
    <div class="container mt-5">
        <div class="glass-card p-4 text-white">

            <h2 class="text-center">Crime Prediction Result</h2>
            <hr>

            <p><b>State:</b> {{state}}</p>
            <p><b>District:</b> {{district}}</p>
            <p><b>Year:</b> {{year}}</p>
            <p><b>Total IPC Crimes:</b> {{total}}</p>

            <hr>

            <h4>Logistic Regression Prediction: <span class="text-warning">{{log_pred}}</span></h4>
            <h4>SVM Prediction: <span class="text-info">{{svm_pred}}</span></h4>

            <div class="text-center mt-4">
                <a href="/predict" class="btn btn-light">Predict Again</a>
            </div>

        </div>
    </div>
</body>
</html>
